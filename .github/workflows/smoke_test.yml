name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        # Install project requirements
        pip install -e ".[dev]"
        
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
        
    - name: Smoke Tests
      run: |
        echo "Rodando testes unitários e smoke tests da orquestração dos Agentes..."
        pytest tests/unit -v --tb=short
